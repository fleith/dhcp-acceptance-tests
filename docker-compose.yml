services:
  dhcp-server:
    build: ./dhcp
    container_name: dhcp-test-server
    network_mode: host
    command: ["eth0"]
    cap_add:
      - NET_ADMIN
    privileged: true

  test-runner:
    image: python:3.13-slim
    container_name: dhcp-test-runner
    network_mode: host
    privileged: true
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - .:/app
    working_dir: /app
    command: >
      bash -c "apt-get update -qq &&
               apt-get install -y --no-install-recommends iproute2 -qq &&
               pip install -r requirements.txt -q &&
               sleep 5 &&
               python3 run_tests.py"
    depends_on:
      - dhcp-server
