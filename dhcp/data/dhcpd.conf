# Sample configuration for an ISC DHCP server used in the acceptance
# tests.  Adjust the subnet, range, router and DNS values to suit
# your environment.  See dhcpd.conf(5) for details.

default-lease-time 120;
max-lease-time 600;

# This subnet should match the TEST_SUBNET environment variable used
# in the step definitions (192.168.56.0/24 by default).  The range
# defines the pool of addresses that will be offered.  The router
# option tells clients where their default gateway is.
subnet 192.168.65.0 netmask 255.255.255.0 {
    range 192.168.65.100 192.168.65.200;
    option routers 192.168.65.1;
    option subnet-mask 255.255.255.0;
    option domain-name-servers 8.8.8.8;
}